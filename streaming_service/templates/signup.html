{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{% static 'assets/login.css' %}" />
    <title>Registro | Synapse</title>
</head>
<body>
    <div class="bg-image">
        <div class="signup-container">
            <div style="text-align: center; margin-bottom: 15px;">
                <a href="{% url 'home' %}">
                    <img src="{% static 'assets/images/logo1.png' %}" alt="Synapse Logo" style="height: 55px; width: auto; margin: 0 auto;">
                </a>
            </div>
            <h2>Welcome to the future of streaming</h2>
            <div>
                <style>h5 { color: #ef4444; margin-bottom: 15px; font-weight: normal; }</style>
                {% for message in messages %}
                <h5>{{message}}</h5>
                {% endfor %}
            </div>
            <form action="" method="POST">
                {% csrf_token %}
                <input type="email" name="email" placeholder="Email" required />
                <input type="text" name="username" placeholder="Username" required />
                <input type="password" name="password" placeholder="Password" required />
                <input type="password" name="password2" placeholder="Confirm Password" required />

                <button style="color:white" type="submit" class="signup-btn">Start ></button>
            </form>
            <div class="help-text" align="center">
                <span>Already have an account? <a href="/login">Login here</a></span>
            </div>
        </div>
    </div>
</body>
</html>
