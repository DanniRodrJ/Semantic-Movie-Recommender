{% extends 'base.html' %}

{% block title %}My List - Netflix Clone{% endblock %}

{% block content %}

    <section class="py-10 px-5">
        <h2 class="text-3xl font-bold mb-8 text-center">
            My List
        </h2>

        <div class="flex flex-wrap gap-6 justify-center">
            {% for movie in movies %}
                <div class="w-40 md:w-48 cursor-pointer transition-transform hover:scale-105 rounded-lg overflow-hidden shadow-lg relative"
                     data-slug="{{ movie.slug }}"
                     data-title="{{ movie.title|escapejs }}"
                     data-description="{{ movie.overview|escapejs|truncatewords:60 }}"
                     data-year="{{ movie.release_date.year|default:'N/A' }}"
                     data-genre="{% if movie.genres %}{{ movie.genres.0.name|escapejs }}{% else %}N/A{% endif %}"
                     data-poster="{{ movie.poster_url }}"
                     data-backdrop="{{ movie.backdrop_url }}"
                     data-play-url="{% url 'movie_detail' movie.slug %}"
                     onclick="showModal(this)"
                     style="background-image: url('{{ movie.poster_url }}'); 
                            background-size: cover; 
                            background-position: center; 
                            height: 240px;">
                    <div class="w-full h-full bg-gradient-to-t from-black/70 to-transparent flex items-end p-3">
                        <p class="text-white text-sm font-semibold truncate">
                            {{ movie.title }}
                        </p>
                    </div>
                </div>
            {% empty %}
                <p class="text-gray-400 text-center text-xl w-full">
                    Your list is empty. Start adding movies!
                </p>
            {% endfor %}
        </div>
    </section>

{% endblock %}
